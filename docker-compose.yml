

services:
  db:
    image: mysql:8.0
    container_name: lms-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: lms_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lms-backend
    ports:
      - "8080:8080"
    environment:
      MYSQLHOST: db
      MYSQLPORT: "3306"
      MYSQLDATABASE: lms_db
      MYSQLUSER: root
      MYSQLPASSWORD: root
      CORS_ORIGIN: http://localhost:80
    depends_on:
      - db
  
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080
    container_name: lms-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
